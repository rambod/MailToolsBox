name: Release

# Publishes to PyPI when a version tag is pushed (e.g. v3.0.0).
# Uses PyPI Trusted Publishing (OIDC) — no API tokens stored in the repo.
# One-time setup: on PyPI, add a trusted publisher for this repo pointing at
# the "pypi" environment and workflow file "release.yml".

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(python -c 'import re,pathlib; print(re.search(r"__version__\s*=\s*\"([^\"]+)\"", pathlib.Path("MailToolsBox/_version.py").read_text()).group(1))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VERSION tag=$TAG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION"
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # required for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
