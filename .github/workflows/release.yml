name: Release

# Publishes to PyPI when a version tag is pushed (e.g. v3.0.0).
#
# Uses a PyPI API token stored as the repo secret PYPI_API_TOKEN.
# One-time setup: GitHub repo → Settings → Secrets and variables → Actions →
# "New repository secret" → name: PYPI_API_TOKEN, value: your pypi-… token.
#
# Prefer OIDC Trusted Publishing instead? Replace the publish step's `with:`
# block with `permissions: id-token: write` and drop the password — see
# https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Verify tag matches package version
        run: |
          PKG_VERSION="$(python -c 'import re,pathlib; print(re.search(r"__version__\s*=\s*\"([^\"]+)\"", pathlib.Path("MailToolsBox/_version.py").read_text()).group(1))')"
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "package=$PKG_VERSION tag=$TAG_VERSION"
          test "$PKG_VERSION" = "$TAG_VERSION"
      - name: Build
        run: |
          pip install build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          skip-existing: true  # idempotent: re-runs won't fail if the version exists
